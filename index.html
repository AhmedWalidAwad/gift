<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة حبيبة ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            max-width: 350px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 { 
            color: #d81b60; 
            font-size: 28px; 
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        p { 
            color: #444; 
            font-size: 20px; 
            min-height: 100px; 
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
            transition: opacity 0.3s ease;
            display: flex;             
            justify-content: center;
            align-items: center;
        }
        button {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 10px 0;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(240, 98, 146, 0.3);
        }
        button:hover { 
            background-color: #d81b60; 
            box-shadow: 0 6px 12px rgba(216, 27, 96, 0.4);
            transform: translateY(-2px);
        }
        button:active {
            transform: scale(0.95);
        }
        #challengeBtn { 
            background-color: #ad1457;
            box-shadow: 0 4px 6px rgba(173, 20, 87, 0.3);
        }
        #challengeBtn:hover {
            background-color: #880e4f;
            box-shadow: 0 6px 12px rgba(136, 14, 79, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1></h1>ازيك يا حبوبة! 🏃‍♀️🌸</h1>
        <p id="messageDisplay">جاهزة؟ دوسي على زرار واشحني طاقتك!</p>
        
        <button onclick="changeText('positive')">جرعة طاقة إيجابية ✨</button>
        <button onclick="changeText('joke')">حاجة تضحك 😂</button>
        <button id="challengeBtn" onclick="changeText('challenge')">تحدي الكابتن السريع! 💪⏱️</button>
    </div>

    <script>
        // 1. رسايل إيجابية رياضية باسمها
        const messages = [
            "يا رب يومك يكون خفيف زي تسخينة قبل ماتش مهم يا حبيبة! 🏃‍♀️✨",
            "طاقتك الإيجابية بتعدي أي حد، بطلة من يومك! 💪🌸",
            "مهما كان التمرين أو اليوم متعبين، ابتسامتك بتخلي الدنيا أسهل يا حبيبة.",
            "أحلى وأشطر كابتن في الدنيا، ربنا يوفقك في كل خطواتك.",
            "وجودك بيعمل 'توازن' في اليوم أكتر من تمرينات التوازن نفسها! 🤸‍♀️",
            "أتمنى يومك يكون مليان إنجازات ومفيش فيه أي 'إصابات ملاعب'! 😂",
            "زي ما بتهتمي بلياقتك، متنسيش تهتمي بابتسامتك عشان بتنور الدنيا.",
            "عاش يا بطلة، كملي في طريقك وإنتي واثقة في نفسك 100%.",
            "يومك جميل ومشرق زي ميدالية ذهبية على منصة التتويج! 🥇",
            "مبسوط جداً إننا اتعرفنا يا كابتن، وبداية صداقة قوية ومميزة إن شاء الله."
        ];

        // 2. نكت الجيم والرياضة
        const jokes = [
            "مرة واحد بتاع تربية رياضية حب يخطب، راح لأبو العروسة قاله: أنا طالب إيد بنتك و 'شايط' في دبلتها! ⚽😂",
            "إيه الشبه بين المبرمج وطالبة رياضة؟ الاتنين بيعملوا Run طول اليوم، بس أنا على اللاب وانتي في التراك يا حبيبة! 🏃‍♀️💻",
            "ليه دكتور التربية الرياضية مبيزعلش؟ عشان دايماً بياخد الأمور بـ 'روح رياضية'!",
            "مرة مدرب جيم راح يشتري عيش، خلى الخباز يعمله 3 مجاميع في 10 أرغفة!",
            "أكتر حاجة بترعب طالبة رياضة؟ إن حد يقولها 'انزلي 50 ضغط دلوقتي' من غير إحماء!",
            "ليه دايماً بتوع تربية رياضية بيحبوا الشاي؟ عشان بيعملهم 'إحماء' من جوه! ☕",
            "واحد راح الجيم أول يوم، الكابتن قاله شيل الحديد ده، قاله ليه هو تقيل عليك؟",
            "مرة كابتن كورة فتح مطعم، سمى الأكلة الرئيسية 'هاتريك كفتة'!",
            "ليه لاعب الكورة مبيعرفش ينام؟ عشان كل شوية يشوط الغطا!",
            "مرة واحد مسقط في كل المواد إلا الرياضة.. سألوه ليه؟ قالهم عشان بلعبها بخطة 4-4-2!"
        ];

        // 3. التحديات الحركية الممتعة
        const challenges = [
            "تحدي فوري يا حبيبة: قومي اقفي واعملي 5 عدات 'سكوات' (Squats) دلوقتي حالا! 🏋️‍♀️",
            "مهمة سريعة: اشربي كوباية مية كبيرة كاملة.. ترطيب يا كابتن! 💧",
            "تحدي المرونة: حاولي تلمسي صوابع رجلك وإنتي واقفة ورجلك مفرودة! 🤸‍♀️",
            "فاصل استرخاء: خدي نفس عميق جداً (شهيق وزفير) 3 مرات ورا بعض. 😌",
            "تحدي الثبات: اقفي على رجل واحدة وحافظي على توازنك لمدة 15 ثانية! ⏱️",
            "مهمة للمزاج: روحي لأقرب مراية وابتسمي لنفسك أعرض ابتسامة ممكنة يا بطلة! 😁",
            "تحدي اللياقة: اعملي 10 قفزات في مكانك (Jumping Jacks) بسرعة! 💥",
            "مهمة العضلات: شوفي أي عضلة شادة عليكي واعمليلها إطالة (Stretch) بسيطة. 🧘‍♀️",
            "تحدي البلانك: انزلي وضعية 'بلانك' واثبتي لمدة 20 ثانية بس.. وريني القوة! 💪",
            "مهمة تقدير الذات: سقفي لنفسك تسقيفة كبيرة وحماسية عشان إنتي بطلة وتستاهلي! 👏✨"
        ];

        // كائنات لحفظ الترتيب الحالي لكل زرار
        let indices = {
            positive: 0,
            joke: 0,
            challenge: 0
        };

        // دالة بتجيب العنصر اللي عليه الدور وتزود العداد
        function getNextItem(array, type) {
            let currentIndex = indices[type];
            let item = array[currentIndex];
            // بنزود العداد، ولما يوصل لآخر المصفوفة يرجع للصفر تاني
            indices[type] = (currentIndex + 1) % array.length;
            return item;
        }

        function changeText(type) {
            const display = document.getElementById("messageDisplay");
            display.style.opacity = 0; 
            
            setTimeout(() => {
                if (type === 'positive') {
                    display.innerText = getNextItem(messages, 'positive');
                } else if (type === 'joke') {
                    display.innerText = getNextItem(jokes, 'joke');
                } else if (type === 'challenge') {
                    display.innerText = getNextItem(challenges, 'challenge');
                }
                display.style.opacity = 1;
            }, 300); 
        }
    </script>

</body>
</html>
